# MavMeta CI Pipeline
#
# Runs deterministic checks for every pull request and push to master.
# Does not require Salesforce credentials.

name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Verify no inline scripts or handlers in dist HTML
        run: npm run verify:no-inline-scripts

      - name: Verify dist has no unexpected external HTTPS URLs
        run: npm run verify:no-unapproved-https

      - name: Verify no git changes after build
        run: |
          git diff --exit-code || {
            echo "::error::Build process modified files. Run 'npm run build' locally and commit changes.";
            exit 1;
          }
