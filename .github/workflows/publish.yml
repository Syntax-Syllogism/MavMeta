name: Publish to npm

on:
  push:
    branches: [release]

permissions:
  id-token: write
  contents: read

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build server
        run: npm run build:server

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Verify no inline scripts or handlers in dist HTML
        run: npm run verify:no-inline-scripts

      - name: Verify dist has no unexpected external HTTPS URLs
        run: npm run verify:no-unapproved-https

      - name: Publish to npm
        run: npm publish --access public --provenance
